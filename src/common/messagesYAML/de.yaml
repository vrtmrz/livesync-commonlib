    **Ihre Datenbank wird größer!** Aber keine Sorge, wir können es jetzt
    ansprechen. Die Zeit vor dem Auslaufen aus dem Raum auf dem Remote-Speicher.


    | Gemessene Größe | Konfigurierte Größe |

    --- | --- |

    | ${estimatedSize} | ${maxSize}


    > [!MORE]-

    > Wenn Sie es schon seit vielen Jahren verwenden, kann es unreferenzierte
    Stücke - d.h. Müll - in der Datenbank ansammeln. Deshalb empfehlen wir,
    alles neu aufzubauen. Es wird wahrscheinlich viel kleiner werden.

    >

    > Wenn das Volumen Ihres Tresors einfach zunimmt, ist es besser, alles nach
    der Organisation der Dateien wieder aufzubauen. Self-hosted LiveSync löscht
    die tatsächlichen Daten nicht, auch wenn Sie sie löschen, um den Prozess zu
    beschleunigen. Es ist grob
    [documented](https://github.com/vrtmrz/obsidian-livesync/blob/main/docs/tech
    info.md).

    >

    > Wenn Sie die Zunahme nicht ausmachen, können Sie die
    Benachrichtigungsgrenze um 100MB erhöhen. Dies ist der Fall, wenn Sie es auf
    Ihrem eigenen Server ausführen. Es ist jedoch besser, alles von Zeit zu Zeit
    wieder aufzubauen.

    >


    > (! WARNEN)

    > Wenn Sie alles neu aufbauen, stellen Sie sicher, dass alle Geräte
    synchronisiert sind. Das Plug-in wird jedoch so viel wie möglich
    verschmelzen.
