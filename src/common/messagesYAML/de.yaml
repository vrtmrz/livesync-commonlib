      Remote-Server gesendet werden. Das bedeutet, dass selbst bei Zugriff auf
      den Server niemand Ihre Daten ohne die Passphrase lesen kann. Merken Sie
      sich Ihre Passphrase unbedingt, da sie auch auf anderen Geräten zum
      Entschlüsseln Ihrer Daten benötigt wird.
    StronglyRecommendedLine2: "Bitte beachten Sie außerdem: Wenn Sie
      Peer-to-Peer-Synchronisation verwenden, wird diese Konfiguration auch dann
      genutzt, wenn Sie künftig zu anderen Methoden wechseln und sich mit einem
