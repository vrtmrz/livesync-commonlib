  Message:
    Main: >-
      
      Die Einstellungen in der entfernten Datenbank sind unten aufgeführt. Diese
      Werte wurden von anderen Geräten konfiguriert, die mindestens einmal mit
      diesem Gerät synchronisiert wurden.


      Wenn du diese Einstellungen verwenden möchtest, wähle
      %{TweakMismatchResolve.Action.UseConfigured}.

      Wenn du die Einstellungen dieses Geräts behalten möchtest, wähle
      %{TweakMismatchResolve.Action.Dismiss}.


      ${table}


      >[!TIP]

      > Wenn du alle Einstellungen synchronisieren möchtest, verwende `Sync
      settings via markdown`, nachdem du mit dieser Funktion die minimale
      Konfiguration angewendet hast.


      ${additionalMessage}
    MainTweakResolving: >-
      Deine Konfiguration stimmt nicht mit der auf dem entfernten Server
      überein.


      Die folgende Konfiguration sollte übereinstimmen:


      ${table}


      Bitte teile uns deine Entscheidung mit.


      ${additionalMessage}
    UseRemote:
      WarningRebuildRecommended: >-
        
        >[!NOTICE]

        > Einige Änderungen sind kompatibel, können aber zusätzliche Speicher-
        und Transfermengen verbrauchen. Ein Rebuild wird empfohlen. Es darf
        jedoch derzeit kein Neuaufbau durchgeführt werden, sondern kann in der
        zukünftigen Wartung umgesetzt werden.

        > *** Bitte stellen Sie sicher, dass Sie Zeit haben und an ein stabiles
        Netzwerk angeschlossen sind, um sich zu bewerben!***
      WarningRebuildRequired: >-
        
        >[!WARNUNG]

        > Einige Remote-Konfigurationen sind nicht kompatibel mit der lokalen
        Datenbank dieses Gerätes. Der Wiederaufbau der lokalen Datenbank ist
        erforderlich.

        > *** Bitte stellen Sie sicher, dass Sie Zeit haben und an ein stabiles
        Netzwerk angeschlossen sind, um sich zu bewerben!***
    WarningIncompatibleRebuildRecommended: >-
      
      >[!NOTICE]

      > Wir haben festgestellt, dass einige der Werte unterschiedlich sind, um
      die lokale Datenbank mit der Remote-Datenbank unvereinbar zu machen.

      > Einige Änderungen sind kompatibel, können aber zusätzliche Speicher- und
      Transfermengen verbrauchen. Ein Rebuild wird empfohlen. Es darf jedoch
      derzeit kein Neuaufbau durchgeführt werden, sondern kann in der
      zukünftigen Wartung umgesetzt werden.

      > Wenn Sie wieder aufbauen möchten, dauert es ein paar Minuten oder mehr.
      ** Stellen Sie sicher, dass es jetzt sicher ist.**
    WarningIncompatibleRebuildRequired: >-
      
      >[!WARNUNG]

      > Wir haben festgestellt, dass einige der Werte unterschiedlich sind, um
      die lokale Datenbank mit der Remote-Datenbank unvereinbar zu machen.

      > Es sind entweder lokale oder Remote-Rebuilds erforderlich. Beide nehmen
      ein paar Minuten oder mehr. ** Stellen Sie sicher, dass es jetzt sicher
      ist.**
  Table:
    _value: |+
