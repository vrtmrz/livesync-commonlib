RedFlag:
  Fetch:
    Method:
      Desc: >-
        Wie möchten Sie abrufen?

        - %{RedFlag.Fetch.Method.FetchSafer}.
          **Wenig Datenverkehr**, **hohe CPU-Last**, **geringes Risiko**
          Empfohlen, wenn ...
          - Dateien möglicherweise inkonsistent sind
          - es nicht sehr viele Dateien gibt
        - %{RedFlag.Fetch.Method.FetchSmoother}.
          **Wenig Datenverkehr**, **mäßige CPU-Last**, **geringes bis mäßiges Risiko**
          Empfohlen, wenn ...
          - Dateien wahrscheinlich konsistent sind
          - Sie viele Dateien haben.
        - %{RedFlag.Fetch.Method.FetchTraditional}.
          **Hoher Datenverkehr**, **geringe CPU-Last**, **geringes bis mäßiges Risiko**

        >[!INFO]- Details

        > ## %{RedFlag.Fetch.Method.FetchSafer}.

        > **Wenig Datenverkehr**, **hohe CPU-Last**, **geringes Risiko**

        > Diese Option erstellt zuerst eine lokale Datenbank aus vorhandenen
        lokalen Dateien, bevor Daten aus der entfernten Quelle abgerufen werden.

        > Wenn passende Dateien lokal und remote vorhanden sind, werden nur die
        Unterschiede übertragen.

        > Dateien, die an beiden Orten vorhanden sind, werden jedoch zunächst
        als Konfliktdateien behandelt. Wenn sie nicht wirklich in Konflikt
        stehen, werden sie automatisch aufgelöst, aber das kann einige Zeit
        dauern.

        > Dies ist im Allgemeinen die sicherste Methode und minimiert das Risiko
        von Datenverlust.

        > ## %{RedFlag.Fetch.Method.FetchSmoother}.

        > **Wenig Datenverkehr**, **mäßige CPU-Last**, **geringes bis mäßiges
        Risiko** (je nach Vorgang)

        > Diese Option erstellt zuerst Chunks aus lokalen Dateien für die
        Datenbank und ruft dann Daten ab. Dadurch werden nur lokal fehlende
        Chunks übertragen. Alle Metadaten werden jedoch aus der entfernten
        Quelle übernommen.

        > Lokale Dateien werden beim Start mit diesen Metadaten verglichen.
        Inhalte, die als neuer gelten, überschreiben ältere Inhalte (nach
        Änderungszeit). Dieses Ergebnis wird anschließend zurück in die
        entfernte Datenbank synchronisiert.

        > Dies ist in der Regel sicher, wenn die lokalen Dateien wirklich den
        neuesten Zeitstempel haben. Es kann jedoch Probleme verursachen, wenn
        eine Datei einen neueren Zeitstempel, aber älteren Inhalt hat (wie die
        ursprüngliche `welcome.md`).

        > Diese Methode verwendet weniger CPU und ist schneller als
        "%{RedFlag.Fetch.Method.FetchSafer}", kann aber bei unvorsichtiger
        Verwendung zu Datenverlust führen.

        > ## %{RedFlag.Fetch.Method.FetchTraditional}.

        > **Hoher Datenverkehr**, **geringe CPU-Last**, **geringes bis mäßiges
        Risiko** (je nach Vorgang)

        > Alles wird aus der entfernten Quelle abgerufen.

        > Ähnlich wie %{RedFlag.Fetch.Method.FetchSmoother}, aber alle Chunks
        werden aus der entfernten Quelle abgerufen.

        > Dies ist die traditionellste Abrufmethode und benötigt in der Regel
        den meisten Netzwerkverkehr und die meiste Zeit. Außerdem besteht ein
        ähnliches Risiko, entfernte Dateien zu überschreiben, wie bei der Option
        '%{RedFlag.Fetch.Method.FetchSmoother}'.

        > Sie gilt jedoch oft als die stabilste Methode, weil sie am längsten
        etabliert und am direktesten ist.
      FetchSafer: Erstellen Sie eine lokale Datenbank einmal vor dem Abrufen
      FetchSmoother: Erstellen Sie lokale Datei-Chunks vor dem Abruf
      FetchTraditional: Alles aus der Ferne holen
      Title: Wie wollen Sie holen?
