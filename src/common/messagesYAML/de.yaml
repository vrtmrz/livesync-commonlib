  logRemoteTweakUnavailable: Kann nicht Remote-Tweak-Werte erhalten
  logSetupCancelled: Das Setup wurde abgesagt, Self-hosted LiveSync wartet auf Ihr Setup!
  msgFetchRemoteAgain: >-
    Wie Sie vielleicht schon wissen, hat der selbstgehostete LiveSync sein
    Standardverhalten und seine Datenbankstruktur verändert.


    Und dank Ihrer Zeit und Mühe scheint die Remote-Datenbank bereits
    ausgewandert zu sein. Glückwunsch!


    Aber wir brauchen etwas mehr. Die Konfiguration dieses Gerätes ist nicht mit
    der Remote-Datenbank kompatibel. Wir müssen die Remote-Datenbank wieder
    holen. Sollen wir jetzt wieder von der Fernbedienung holen?

      Anmerkung: Wir können nicht synchronisieren, bis die Konfiguration geändert wurde und die Datenbank wieder gestartet wurde.
      Note2: Die Stücke sind völlig unveränderlich, wir können nur die Metadaten und Differenz holen.
  msgInitialSetup: >-
    Dein Gerät wurde **noch nicht eingerichtet**. Ich führe dich durch die
    Einrichtung.


    Bitte beachte, dass jeder Dialoginhalt in die Zwischenablage kopiert werden
    kann. Wenn du ihn später brauchst, kannst du ihn in eine Obsidian-Notiz
    einfügen. Du kannst ihn auch mit einem Übersetzungstool in deine Sprache
    übersetzen.


    Zuerst: Hast du eine **Setup URI**?


    Hinweis: Wenn du nicht weißt, was das ist, lies bitte die
    [Dokumentation](${URI_DOC}).
  msgRecommendSetupUri: >-
    Wir empfehlen dringend, eine Setup URI zu erzeugen und zu verwenden.

    Wenn du damit nicht vertraut bist, lies bitte die
    [Dokumentation](${URI_DOC}) (nochmals Entschuldigung, aber das ist wichtig).


    Wie möchtest du die Verbindung manuell einrichten?
  msgSinceV02321: >-
    Seit v0.23.21 hat der selbstgehostete LiveSync das Standardverhalten und die
    Datenbankstruktur verändert. Es wurden folgende Änderungen vorgenommen:


    1. **Case Empfindlichkeit der Dateinamen*

    Der Umgang mit Dateinamen ist jetzt case-insensitive. Dies ist eine günstige
    Änderung für die meisten Plattformen, andere als Linux und iOS, die nicht
    verwalten Dateiname Fall Sensibilität effektiv.

    (Bei diesen wird eine Warnung für Dateien mit dem gleichen Namen angezeigt,
    aber verschiedene Fälle).


    2. **Bearbeitung der Stücke*

    Chunks sind unveränderlich, wodurch ihre Revisionen behoben werden können.
    Diese Änderung wird die Leistung der Dateisparen verbessern.

       Um diese Änderungen zu aktivieren, müssen sowohl Remote- als auch lokale Datenbanken wieder aufgebaut werden. Dieser Prozess dauert ein paar Minuten, und wir empfehlen, es zu tun, wenn Sie viel Zeit haben.

    - Wenn Sie das bisherige Verhalten beibehalten möchten, können Sie diesen
    Prozess mit `${KEEP}` überspringen.

    - Wenn Sie nicht genug Zeit haben, wählen Sie bitte `${DISMISS}`. Sie werden
    später wieder aufgefordert.

    - Wenn Sie die Datenbank auf einem anderen Gerät wieder aufgebaut haben,
    wählen Sie bitte `${DISMISS}` aus und versuchen Sie erneut zu
    synchronisieren. Da ein Unterschied erkannt wurde, werden Sie erneut
    aufgefordert.
