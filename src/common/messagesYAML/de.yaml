  Note:
    description: >2-
       Dieser Replikator ermöglicht es uns, unseren Tresor mit anderen Geräten
      zu synchronisieren mit einer Peer-to-Peer-Verbindung. Wir können dies
      nutzen, um unseren Tresor mit unseren anderen Geräten zu synchronisieren,
      ohne einen Cloud-Service zu verwenden.

      Dieser Replikator basiert auf Trystero. Es verwendet auch einen
      Signalisierungsserver, um eine Verbindung zwischen Geräten herzustellen.
      Der Signalisierungsserver dient zum Austausch von Verbindungsinformationen
      zwischen Geräten. Es kann (oder,sollte) keine unserer Daten kennen oder
      speichern.


      Der Signalisierungsserver kann von jedem gehostet werden. Das ist nur ein
      Nostr-Relais. Zur Vereinfachung und Kontrolle des Verhaltens des
      Replikators wird eine Instanz des Signalisierungsservers von vrtmrz
      gehostet. Sie können den von vrtmrz bereitgestellten experimentellen
      Server verwenden, oder Sie können einen anderen Server verwenden.


      Übrigens, selbst wenn der Signalisierungsserver unsere Daten nicht
      speichert, kann er die Verbindungsinformationen einiger unserer Geräte
      sehen. Bitte beachten Sie das. Seien Sie auch vorsichtig, wenn Sie den von
      jemand anderem bereitgestellten Server verwenden.
    important_note: Peer-to-Peer-Replikator.
