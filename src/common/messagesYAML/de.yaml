  msgObjectStorageWarning: >-
    WARNING: Diese Funktion ist ein Work In Progress, also beachten Sie bitte
    Folgendes:

    - Nur Architektur anhängen. Um den Speicher zu schrumpfen, ist ein Rebuild
    erforderlich.

    - Etwas zerbrechlich.

    - Beim ersten Synchronisieren wird die gesamte Geschichte aus der Ferne
    übertragen. Achten Sie auf Datenkappen und langsame Geschwindigkeiten.

    - Nur Unterschiede werden live synchronisiert.


    Wenn Sie in irgendwelche Probleme laufen oder Ideen über diese Funktion
    haben, erstellen Sie bitte ein Thema auf GitHub.

    Ich schätze Sie für Ihre große Hingabe.
  msgOriginCheck: "Herkunftsprüfung: ${org}"
  msgRebuildRequired: >-
    Zum Anwenden der Änderungen müssen die Datenbanken neu aufgebaut werden.
    Bitte wähle aus, wie die Änderungen angewendet werden sollen.


    <details>

    <summary>Legende</summary>


    | Symbol | Bedeutung |

    |: ------ :| ------- |

    | ⇔ | Aktuell |

    | ⇄ | Zum Ausgleichen synchronisieren |

    | ⇐,⇒ | Mit Überschreiben übertragen |

    | ⇠,⇢ | Von der anderen Seite mit Überschreiben übertragen |


    </details>


    ## ${OPTION_REBUILD_BOTH}

    Kurzfassung:  📄 ⇒¹ 💻 ⇒² 🛰️ ⇢ⁿ 💻 ⇄ⁿ⁺¹ 📄

    Lokale und entfernte Datenbank mit den vorhandenen Dateien dieses Geräts neu
    aufbauen.

    Dadurch werden andere Geräte ausgesperrt; sie müssen anschließend Daten
    abrufen.

    ## ${OPTION_FETCH}

    Kurzfassung: 📄 ⇄² 💻 ⇐¹ 🛰️ ⇔ 💻 ⇔ 📄

