The minimum interval for automatic synchronisation on event.: Das Mindestintervall für die automatische Synchronisation auf dem Event.
This feature enables direct synchronisation between devices. No server is required, but both devices must be online at the same time for synchronisation to occur, and some features may be limited. Internet connection is only required to signalling (detecting peers) and not for data transfer.:
  Diese Funktion ermöglicht die direkte Synchronisation zwischen Geräten. Es
  wird kein Server benötigt, aber beide Geräte müssen gleichzeitig online sein,
  damit synchronisiert werden kann, und einige Funktionen können eingeschränkt
  sein. Eine Internetverbindung wird nur für das Signalling (Erkennen von Peers)
  benötigt, nicht für die Datenübertragung。
This is an advanced option for users who do not have a URI or who wish to configure detailed settings.:
