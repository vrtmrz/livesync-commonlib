    ObfuscatePropertiesDesc: Das Verschleiern von Eigenschaften (z. B. Dateipfad,
      Größe sowie Erstellungs- und Änderungsdatum) fügt eine zusätzliche
      Sicherheitsebene hinzu, da die Struktur und die Namen Ihrer Dateien und
