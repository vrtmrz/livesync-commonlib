  RULES:
    E2EE_V02500:
      REASON: Die End-to-End-Verschlüsselung ist jetzt robuster und schneller. Auch
        weil sich die bisherige E2EE in einer erneut umgesetzten Code-Review als
        kompromittiert erwiesen hat. Es sollte so schnell wie möglich angewendet
        werden. Entschuldigt euch wirklich für eure Unannehmlichkeiten. Und
        diese Einstellung ist nicht nach vorne kompatibel. Alle synchronisierten
        Geräte müssen auf v0.25.0 oder höher aktualisiert werden. Rebuilds sind
        nicht erforderlich und wird von der neuen Übertragung in das neue Format
        umgewandelt werden, Es wird jedoch empfohlen, wieder aufzubauen, wann
        immer möglich.
