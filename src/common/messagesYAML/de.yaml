    PassphraseValidationLine2: Daher bitten wir Sie, beim manuellen Konfigurieren
      der Serverinformationen äußerst vorsichtig zu sein. Wenn eine falsche
      Passphrase eingegeben wird, werden die Daten auf dem Server beschädigt.
      Bitte haben Sie Verständnis dafür, dass dies beabsichtigtes Verhalten ist.
    PlaceholderPassphrase: Geben Sie Ihre Passphrase ein
    StronglyRecommendedLine1: Wenn Sie die Ende-zu-Ende-Verschlüsselung aktivieren,
