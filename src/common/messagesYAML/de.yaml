Setup:
  Apply:
    Buttons:
      ApplyAndFetch: Apply und Fetch
      ApplyAndMerge: Anwenden und Verschmelzen
      ApplyAndRebuild: Anwenden und wieder aufbauen
      Cancel: Discard und Abbrechen
      OnlyApply: Nur anwenden
    Message: >-
      Die neue Konfiguration ist fertig. Lassen Sie uns es anwenden.

      Es gibt verschiedene Möglichkeiten, dies anzuwenden:


      - Apply und Fetch

      Konfigurieren Sie dieses Gerät als neuer Client. Nach der Anwendung,
      synchronisieren Sie vom Remote-Server.

      - Anwenden und Verschmelzen

      Konfigurieren Sie auf einem Gerät, das bereits die Datei hat. Es
      verarbeitet die lokalen Dateien und überträgt die Unterschiede. Konflikte
      können entstehen.

      - Anwenden und wieder aufbauen

      Wiederherstellen der Fernbedienung mit lokalen Dateien. Dies geschieht
      typischerweise, wenn der Server beschädigt wird oder wir von Grund auf
      starten möchten.

      Andere Geräte werden gesperrt und benötigt, um wieder zu holen.

      - Nur bewerben

      Nur anwenden. Konflikte können entstehen, wenn ein Wiederaufbau
      erforderlich ist.
    Title: Neue Konfiguration aus dem ${method} anwenden
    WarningRebuildRecommended: "HINWEIS: Nach der Einstellung der Einstellungen
      wurde festgestellt, dass ein Rebuild erforderlich ist; Nur Import wird
      nicht empfohlen."
  Command:
    CopySetupUri: Copy settings as a new setup URI
    CopySetupUriFull: Copy settings as a new setup URI (Full)
    CopySetupUriWithSync: Copy settings as a new setup URI (With customization sync)
    OpenSetupUri: Use the copied setup URI (Formerly Open setup URI)
    ShowSettingsQrCode: Show settings as a QR code
  Doctor:
    Buttons:
      No: Nein, nicht jetzt
      Yes: Ja, bitte den Doktor konsultieren
    Message: >-
      Selbstgehostete LiveSync ist in der Geschichte allmählich länger geworden
      und einige empfohlene Einstellungen haben sich geändert.


      Nun, Setup ist eine sehr gute Zeit, dies zu tun.


      Möchten Sie Doctor ausführen, um zu überprüfen, ob die importierten
      Einstellungen im Vergleich zum neuesten Zustand optimal sind?
    Title: Möchten Sie den Arzt konsultieren?
  EncryptSettingsPassphrase: The passphrase to encrypt the setup URI
  EncryptSettingsTitle: Encrypt your settings
  FetchRemoteConf:
    Buttons:
      Fetch: Ja, bitte holen Sie die Konfiguration
      Skip: Nein, bitte benutzen Sie die Einstellungen im URI
    Message: >-
      Wenn wir bereits einmal mit einem anderen Gerät synchronisiert sind,
      speichert die Remote-Datenbank die geeigneten Konfigurationswerte zwischen
      den synchronisierten Geräten. Das Plug-in möchte sie für eine robuste
      Konfiguration abrufen.


      Aber wir müssen sicherstellen, dass die eine Sache. Sind wir derzeit in
      einer Situation, in der wir auf das Netzwerk sicher zugreifen und die
      Einstellungen abrufen können?


      Hinweis: Meistens sind Sie sicher, dies zu tun, dass Ihre Remote-Datenbank
