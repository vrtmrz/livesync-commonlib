moduleMigration:
  docUri: https://github.com/vrtmrz/obsidian-livesync/blob/main/README.md#how-to-use
  fix0256:
    buttons:
      checkItLater: Überprüfen Sie es später
      DismissForever: Ich habe es repariert und frage mich nicht wieder
      fix: Fehler
    message: >
      Aufgrund eines kürzlichen Fehlers (in v0.25.6) wurden einige Dateien
      möglicherweise nicht korrekt in der Synchronisierungsdatenbank
      gespeichert.

      Wir haben die Dateien geprüft und einige gefunden, die repariert werden
      müssen.


      **Dateien, die repariert werden können:**


      ${files}


      Für diese Dateien gibt es im Speicher eine größenmäßig passende
      Originaldatei, daher sind sie wahrscheinlich wiederherstellbar.

      Wir können sie verwenden, um die Datenbank zu reparieren. Klicke unten auf
      "Reparieren".


      ${messageUnrecoverable}


      Wenn du dies erneut ausführen möchtest, kannst du das in Hatch tun.
    messageUnrecoverable: >
      **Files können auf diesem Gerät nicht fixiert werden:**


      ${filesNotRecoverable}


      Diese Dateien haben inkonsistente Metadaten und können auf diesem Gerät
      nicht fixiert werden (vor allem können wir nicht festlegen, welche korrekt
      ist).

      Um sie wiederherzustellen, überprüfen Sie bitte Ihre anderen Geräte (auch
      durch diese Funktion) oder wiederherstellen sie manuell von einem Backup.
    title: Gebrochene Dateien wurden erkannt
  insecureChunkExist:
    buttons:
      fetch: Ich habe die Fernbedienung schon wieder aufgebaut. Fetch aus der Ferne
      later: ich werde es später tun
      rebuild: Alles neu aufbauen
    laterMessage: Wir empfehlen dringend, dies so schnell wie möglich zu behandeln!
    message: >
      Einige Stücke werden nicht sicher gespeichert und nicht in Datenbanken
      verschlüsselt.

      **Bitte die Datenbank neu aufbauen, um dieses Problem zu beheben**.


      Wenn Ihre Remote-Datenbank nicht mit SSL konfiguriert ist, oder mit
      weniger sicheren Anmeldeinformationen, ** Sie sind in Gefahr, sensible
      Daten zu entwerfen*.


      Hinweis: Bitte aktualisieren Sie Ihren Self-hosted LiveSync v0.25.6 oder
      höher auf alle Ihre Geräte und sichern Sie Ihren Tresor sicher.

      Hinweis2: Wiederherstellen Alles und Fetch verbraucht etwas Zeit und
      Verkehr, bitte tun Sie es in Off-peak Stunden und stellen Sie eine stabile
      Netzwerkverbindung.
    title: Unsichere Stücke gefunden!
  logBulkSendCorrupted: Senden Sie Stücke in Masse wurde aktiviert, aber diese
