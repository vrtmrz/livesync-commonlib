  Dialogue:
    Locked:
      Action:
        Dismiss: Zurück zur Bestätigung
        Fetch: Synchronisation auf diesem Gerät zurücksetzen
        Unlock: Entsperren Sie die Remote-Datenbank
      Message:
        _value: >
          Die entfernte Datenbank ist gesperrt. Das liegt an einem Neuaufbau auf
          einem der Geräte.

          Dieses Gerät soll daher die Verbindung zurückhalten, um eine
          Beschädigung der Datenbank zu vermeiden.


          Es gibt drei mögliche Aktionen:


          - %{Replicator.Dialogue.Locked.Action.Fetch}
            Der bevorzugte und zuverlässigste Weg. Die lokale Datenbank wird einmal verworfen und alle Synchronisierungsinformationen werden erneut aus der entfernten Datenbank übernommen. In den meisten Fällen ist das sicher. Es dauert jedoch etwas und sollte bei stabiler Netzwerkverbindung durchgeführt werden.
          - %{Replicator.Dialogue.Locked.Action.Unlock}
            Diese Methode sollte nur verwendet werden, wenn wir bereits durch andere Replikationsmethoden zuverlässig synchronisiert sind. Das bedeutet nicht einfach, dass die Dateien gleich aussehen. Wenn du unsicher bist, solltest du sie vermeiden.
          - %{Replicator.Dialogue.Locked.Action.Dismiss}
              Dadurch wird der Vorgang abgebrochen. Beim nächsten Versuch wird erneut gefragt.
        Fetch: Es ist alles geplant. Plug-in wird neu gestartet, um es auszuführen.
        Unlocked: Die Remote-Datenbank wurde entsperrt. Bitte wiederholen Sie die
          Operation.
      Title: Gesperrt
