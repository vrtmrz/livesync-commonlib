      Sie, dass Sie sicherstellen, dass Ihre Daten gesichert werden, bevor Sie
      diese Funktion nutzen. Und wir wären so glücklich, wenn Sie zur
      Entwicklung dieser Funktion beitragen könnten.
    Summary: Was ist diese Funktion? (und einige wichtige Anmerkungen, bitte lesen
