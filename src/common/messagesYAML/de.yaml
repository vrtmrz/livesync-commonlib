  können. Chunks, die diese Zahl überschreiten, werden sofort selbständige
  Stücke absolvieren.
The maximum total size of chunks that can be incubated within the document. Chunks exceeding this size will immediately graduate to independent chunks.:
  Die maximale Gesamtgröße der Stücke, die innerhalb des Dokuments inkubiert
