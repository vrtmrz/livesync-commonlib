  Action:
    Dismiss: Entlassung
    UseConfigured: Verwenden Sie die konfigurierten Einstellungen
    UseMine: Remote-Datenbankeinstellungen aktualisieren
    UseMineAcceptIncompatible: Aktualisieren Sie Remote-Datenbankeinstellungen, aber halten Sie wie
    UseMineWithRebuild: Remote-Datenbankeinstellungen aktualisieren und wieder aufbauen
