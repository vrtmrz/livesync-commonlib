      これらのファイルはメタデータに不整合があり、このデバイスでは修正できません（ほとんどの場合、どちらが正しいか判定できません）。
      復元するには、他のデバイスで確認するか、バックアップから手動で復元してください。
    title: 破損ファイルが検出されました
  insecureChunkExist:
    buttons:
      fetch: リモートを既に再構築した。リモートからフェッチ
      later: 後で行う
      rebuild: すべてを再構築
    laterMessage: できるだけ早く対処することを強くお勧めします！
    message: |
      一部のチャンクが安全に保存されておらず、データベースで暗号化されていません。
      **この問題を修正するにはデータベースを再構築してください**。

      リモートデータベースがSSLで設定されていない、または安全性の低い認証情報を使用している場合、**機密データが漏洩するリスクがあります**。

      注意: すべてのデバイスでSelf-hosted LiveSync v0.25.6以降にアップグレードし、必ず保管庫をバックアップしてください。
      注意2: すべてを再構築とフェッチは時間とトラフィックを消費します。オフピーク時間に安定したネットワークで実行してください。
    title: 安全でないチャンクが見つかりました！
  logBulkSendCorrupted: チャンクの一括送信が有効にされていましたが、この機能に問題がありました。ご不便をおかけして申し訳ありません。自動的に無効化されました。
  logFetchRemoteTweakFailed: リモートの調整値の取得に失敗しました
  logLocalDatabaseNotReady: 何か問題が発生しました！ローカルデータベースが準備できていません
  logMigratedSameBehaviour: 以前と同じ動作でdb:${current}に移行しました
  logMigrationFailed: ${old}から${current}への移行が失敗またはキャンセルされました
  logRedflag2CreationFail: redflag2の作成に失敗しました
  logRemoteTweakUnavailable: リモートの調整値を取得できませんでした
  logSetupCancelled: セットアップがキャンセルされました。Self-hosted LiveSyncはセットアップを待っています！
  msgFetchRemoteAgain: |-
    ご存知のとおり、self-hosted LiveSyncはデフォルトの動作とデータベース構造を変更しました。

    ご協力のおかげで、リモートデータベースはすでに移行されているようです。おめでとうございます！

    しかし、もう少し必要です。このデバイスの設定はリモートデータベースと互換性がありません。リモートデータベースを再度フェッチする必要があります。今すぐリモートから再フェッチしますか？

    ___注意: 設定が変更され、データベースが再フェッチされるまで同期できません。___
    ___注意2: チャンクは完全に不変なので、メタデータと差分のみフェッチできます。___
  msgInitialSetup: |-
    このデバイスは**まだセットアップされていません**。セットアッププロセスをご案内します。

    すべてのダイアログの内容はクリップボードにコピーできます。後で参照する必要があれば、Obsidianのノートに貼り付けてください。翻訳ツールを使ってお使いの言語に翻訳することもできます。

    まず、**セットアップURI**をお持ちですか？

    注意: それが何か分からない場合は、[documentation](${URI_DOC})を参照してください。
  msgRecommendSetupUri: |-
    セットアップURIを生成して使用することを強くお勧めします。
    これについて知識がない場合は、[documentation](${URI_DOC})を参照してください（重要です）。

    手動でセットアップしますか？
  msgSinceV02321: |-
    v0.23.21以降、self-hosted LiveSyncはデフォルトの動作とデータベース構造を変更しました。以下の変更が行われました：

    1. **ファイル名の大文字小文字の区別**
       ファイル名の処理が大文字小文字を区別しなくなりました。これは、ファイル名の大文字小文字を効果的に管理しないLinuxとiOS以外のほとんどのプラットフォームにとって有益な変更です。
       （これらの環境では、同じ名前で大文字小文字が異なるファイルに対して警告が表示されます）。

    2. **チャンクのリビジョン処理**
       チャンクは不変であり、リビジョンを固定できます。この変更により、ファイル保存のパフォーマンスが向上します。

    ___しかし、これらの変更を有効にするには、リモートとローカルの両方のデータベースを再構築する必要があります。このプロセスは数分かかります。時間に余裕があるときに行うことをお勧めします。___

    - 以前の動作を維持したい場合は、`${KEEP}`を使用してこのプロセスをスキップできます。
    - 時間がない場合は、`${DISMISS}`を選択してください。後で再度確認されます。
    - 別のデバイスでデータベースを再構築した場合は、`${DISMISS}`を選択して再度同期してみてください。差異が検出されたため、再度確認されます。
