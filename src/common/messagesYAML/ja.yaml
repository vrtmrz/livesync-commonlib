    > - 800: リモートストレージサイズが800MBを超えたら警告。
    >   1GB制限のfly.ioやIBM Cloudantを使用している場合に推奨されます。
    > - 2000: リモートストレージサイズが2GBを超えたら警告。

    制限に達した場合、段階的に制限を増やすよう求められます。
