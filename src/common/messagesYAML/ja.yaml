  msgConfirmRebuild: これは少し時間がかかる場合があります。本当に今すべてを再構築しますか？
  msgDatabaseGrowing: |
    **データベースが大きくなっています！** でも心配しないでください。リモートストレージの容量が不足する前に対応できます。

    | 測定サイズ | 設定サイズ |
