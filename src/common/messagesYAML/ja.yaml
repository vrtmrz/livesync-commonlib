      - 適用してフェッチ
        このデバイスを新しいクライアントとして設定します。適用後、リモートサーバーから同期します。
      - 適用してマージ
        既にファイルがあるデバイスで設定します。ローカルファイルを処理し、差分を転送します。競合が発生する場合があります。
      - 適用して再構築
        ローカルファイルを使用してリモートを再構築します。これは通常、サーバーが破損した場合や最初からやり直したい場合に行います。
        他のデバイスはロックされ、再フェッチが必要になります。
      - 適用のみ
        適用のみを行います。再構築が必要な場合、競合が発生する可能性があります。
