  Action:
    Dismiss: 無視
    UseConfigured: 設定済みの設定を使用
    UseMine: リモートデータベースの設定を更新
    UseMineAcceptIncompatible: リモートデータベースの設定を更新するがそのまま維持
    UseMineWithRebuild: リモートデータベースの設定を更新して再構築
    UseRemote: このデバイスに設定を適用
    UseRemoteAcceptIncompatible: このデバイスに設定を適用し、非互換性を無視
    UseRemoteWithRebuild: このデバイスに設定を適用し、再フェッチ
  Message:
    Main: |-
      
      リモートデータベースの設定は以下の通りです。これらの値は、このデバイスと少なくとも1回同期された他のデバイスによって設定されています。

      これらの設定を使用する場合は、%{TweakMismatchResolve.Action.UseConfigured}を選択してください。
      このデバイスの設定を維持する場合は、%{TweakMismatchResolve.Action.Dismiss}を選択してください。

      ${table}

      >[!TIP]
      > すべての設定を同期したい場合は、この機能で最小限の設定を適用した後、`Sync settings via markdown`を使用してください。

      ${additionalMessage}
    MainTweakResolving: |-
      設定がリモートサーバーの設定と一致しません。

      以下の設定が一致している必要があります：

      ${table}

      判断をお知らせください。

      ${additionalMessage}
    UseRemote:
      WarningRebuildRecommended: |-
        
        >[!NOTICE]
        > 一部の変更は互換性がありますが、追加のストレージと転送量を消費する可能性があります。再構築をお勧めします。ただし、再構築は現時点では実行されない場合がありますが、将来のメンテナンスで実装される可能性があります。
        > ***適用には時間と安定したネットワーク接続が必要です！***
      WarningRebuildRequired: |-
        
        >[!WARNING]
        > 一部のリモート設定はこのデバイスのローカルデータベースと互換性がありません。ローカルデータベースの再構築が必要です。
        > ***適用には時間と安定したネットワーク接続が必要です！***
    WarningIncompatibleRebuildRecommended: |-
      
      >[!NOTICE]
      > ローカルデータベースとリモートデータベースの非互換性を引き起こす値の違いが検出されました。
      > 一部の変更は互換性がありますが、追加のストレージと転送量を消費する可能性があります。再構築をお勧めします。ただし、再構築は現時点では実行されない場合がありますが、将来のメンテナンスで実装される可能性があります。
      > 再構築を行う場合は数分以上かかります。**今実行しても安全か確認してください。**
    WarningIncompatibleRebuildRequired: |-
      
      >[!WARNING]
      > ローカルデータベースとリモートデータベースの非互換性を引き起こす値の違いが検出されました。
      > ローカルまたはリモートの再構築が必要です。どちらも数分以上かかります。**今実行しても安全か確認してください。**
  Table:
    _value: |+
      | 値の名前 | このデバイス | リモート |
      |: --- |: ---- :|: ---- :|
      ${rows}

    Row: "| ${name} | ${self} | ${remote} |"
