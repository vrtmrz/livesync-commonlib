      If we have already synchronised once with another device, the remote
      database stores the suitable configuration values between the synchronised
      devices. The plug-in would like to retrieve them for robust configuration.


      However, we have to make sure the one thing. Are we currently in a
      situation where we can access the network safely and retrieve the
      settings?


      Note: Mostly, you are safe to do this, that your remote database is hosted
      with a SSL certificate, and your network is not compromised.
    Title: Fetch configuration from remote database?
