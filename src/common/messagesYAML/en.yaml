  docUri: https://github.com/vrtmrz/obsidian-livesync/blob/main/README.md#how-to-use
  fix0256:
    buttons:
      checkItLater: Check it later
      DismissForever: I have fixed it, and do not ask again
      fix: Fix
    message: >
      Due to a recent bug (in v0.25.6), some files may not have been saved
      correctly in the sync database.

      We have scanned our files and found some that need to be fixed.


      **Files ready to be fixed:**


      ${files}


      These files have size-matched original file on the storage, and are likely
      to be recoverable.

      We can use them to fix the database, please click the "Fix" button below
      to fix them.


      ${messageUnrecoverable}


      If you want to run it again, you can do so from Hatch.
    messageUnrecoverable: >
      **Files cannot be fixed on this device:**


      ${filesNotRecoverable}


      These files have inconsistent metadata, and cannot be fixed on this device
      (mostly we cannot determine which is correct).

      To restore them, please check your other devices (also by this feature) or
      restore them manually from a backup.
    title: Broken files has been detected
  insecureChunkExist:
    buttons:
      fetch: I already rebuilt the remote. Fetch from the remote
      later: I will do it later
      rebuild: Rebuild Everything
    laterMessage: We strongly recommend to treat this as soon as possible!
    message: >
      Some chunks are not securely stored and are not encrypted in databases.

      **Please rebuild the database to fix this issue**.


      If your Remote Database is not configured with SSL, or using less-secure
      credentials, **you are at risk of exposing sensitive data**.


      Note: Please upgrade your Self-hosted LiveSync v0.25.6 or higher on all
      your devices, and back your vault up surely.

      Note2: Rebuild Everything and Fetch consumes a bit of time and traffic,
      please do it in off-peak hours and ensure a stable network connection.
    title: Insecure chunks found!
