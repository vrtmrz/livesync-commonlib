SettingTab:
  Message:
    AskRebuild: Your changes require fetching from the remote database. Do you want
      to proceed?
Setup:
  Apply:
    Buttons:
      ApplyAndFetch: Apply and Fetch
      ApplyAndMerge: Apply and Merge
      ApplyAndRebuild: Apply and Rebuild
      Cancel: Discard and Cancel
      OnlyApply: Only Apply
    Message: >-
      The new configuration is ready. Let us proceed to apply it.

      There are several ways to apply this:


      - Apply and Fetch
        Configure this device as a new client. After applying, synchronise from the remote server.
      - Apply and Merge
        Configure on a device that already has the file. It processes the local files and transfers the differences. Conflicts may arise.
      - Apply and Rebuild
        Rebuild the remote using local files. This is typically done if the server becomes corrupted or we wish to start from scratch.
        Other devices will be locked and required to re-fetch.
      - Only Apply
        Apply only. Conflicts may arise if a rebuild is required.
    Title: Apply new configuration from the ${method}
    WarningRebuildRecommended: "NOTE: after adjusting the settings, it has been
      determined that a rebuild is required; Just Import is not recommended."
  Doctor:
    Buttons:
      No: No, please use the settings in the URI as is
      Yes: Yes, please consult the doctor
    Message: >-
      Self-hosted LiveSync has gradually become longer in history and some
      recommended settings have changed.


      Now, setup is a very good time to do this.


      Do you want to run Doctor to check if the imported settings are optimal
      compared to the latest state?
    Title: Do you want to consult the doctor?
  FetchRemoteConf:
    Buttons:
      Fetch: Yes, please fetch the configuration
      Skip: No, please use the settings in the URI
    Message: >-
      If we have already synchronised once with another device, the remote
      database stores the suitable configuration values between the synchronised
      devices. The plug-in would like to retrieve them for robust configuration.


      However, we have to make sure the one thing. Are we currently in a
      situation where we can access the network safely and retrieve the
      settings?


      Note: Mostly, you are safe to do this, that your remote database is hosted
      with a SSL certificate, and your network is not compromised.
    Title: Fetch configuration from remote database?
  QRCode: >-
    We have generated a QR code to transfer the settings. Please scan the QR
    code with your phone or other device.

    Note: The QR code is not encrypted, so be careful to open this.


    >[!FOR YOUR EYES ONLY]-

