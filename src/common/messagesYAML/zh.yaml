RedFlag:
  Fetch:
    Method:
      Desc: |-
        您希望如何获取数据？
        - %{RedFlag.Fetch.Method.FetchSafer}
          **低流量**、**高 CPU 占用**、**低风险**
          推荐用于...
          - 文件可能不一致
          - 文件数量不多
        - %{RedFlag.Fetch.Method.FetchSmoother}
          **低流量**、**中等 CPU 占用**、**低到中等风险**
          推荐用于...
          - 文件可能一致
          - 文件数量较多
        - %{RedFlag.Fetch.Method.FetchTraditional}
          **高流量**、**低 CPU 占用**、**低到中等风险**

        >[!INFO]- 详细信息
        > ## %{RedFlag.Fetch.Method.FetchSafer}
        > **低流量**、**高 CPU 占用**、**低风险**
        > 此选项首先使用现有本地文件创建本地数据库，然后从远程源获取数据。
        > 如果本地和远程存在匹配的文件，则仅传输两者之间的差异。
        > 但是，两端都存在的文件最初会被视为冲突文件。如果它们实际上没有冲突，将自动解决，但此过程可能需要时间。
        > 这通常是最安全的方法，能最大限度地降低数据丢失风险。
        > ## %{RedFlag.Fetch.Method.FetchSmoother}
        > **低流量**、**中等 CPU 占用**、**低到中等风险**（取决于操作）
        > 此选项首先从本地文件创建数据块，然后获取数据。因此，仅传输本地缺少的数据块。但是，所有元数据均从远程源获取。
        > 启动时会将本地文件与该元数据进行比较。内容较新的一方将覆盖较旧的一方（按修改时间）。然后将结果同步回远程数据库。
        > 如果本地文件的时间戳确实是最新的一般来说是安全的。但是，如果文件具有较新的时间戳但内容较旧（如初始的 `welcome.md`），则可能导致问题。
        > 此方法使用较少的 CPU 且比"%{RedFlag.Fetch.Method.FetchSafer}"更快，但如果使用不当可能导致数据丢失。
        > ## %{RedFlag.Fetch.Method.FetchTraditional}
        > **高流量**、**低 CPU 占用**、**低到中等风险**（取决于操作）
        > 所有数据将从远程获取。
        > 与 %{RedFlag.Fetch.Method.FetchSmoother} 类似，但所有数据块都从远程源获取。
        > 这是最传统的获取方式，通常消耗最多的网络流量和时间。它也存在与"%{RedFlag.Fetch.Method.FetchSmoother}"选项类似的覆盖远程文件的风险。
        > 但是，由于它是最久经考验和最直接的方法，通常被认为是最稳定的。
      FetchSafer: 获取前先创建本地数据库
      FetchSmoother: 获取前先创建本地文件块
      FetchTraditional: 从远程获取所有数据
