      Cancel: Descartar y cancelar
      OnlyApply: Solo aplicar
    Message: >-
      La nueva configuración está lista. Procedamos a aplicarlo.

      Hay varias maneras de aplicar esto:


      - Aplicar y buscar
        Configure este dispositivo como un nuevo cliente. Después de aplicar, sincronice desde el servidor remoto.
      - Aplicar y fusionar
        Configure en un dispositivo que ya tenga el archivo. Procesa los archivos locales y transfiere las diferencias. Pueden surgir conflictos.
      - Aplicar y reconstruir
        Reconstruya el control remoto usando archivos locales. Normalmente, esto se hace si el servidor se daña o si deseamos empezar desde cero.
        Otros dispositivos se bloquearán y será necesario volver a buscarlos.
      - Sólo aplicar
        Aplicar únicamente. Pueden surgir conflictos si se requiere una reconstrucción.
