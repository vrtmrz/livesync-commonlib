This feature enables direct synchronisation between devices. No server is required, but both devices must be online at the same time for synchronisation to occur, and some features may be limited. Internet connection is only required to signalling (detecting peers) and not for data transfer.:
  Esta función permite la sincronización directa entre dispositivos. No requiere
  servidor, pero ambos dispositivos deben estar en línea al mismo tiempo para
  que la sincronización se produzca, y algunas funciones pueden ser limitadas.
  La conexión a Internet solo se necesita para la señalización (detección de
  pares), no para la transferencia de datos。
