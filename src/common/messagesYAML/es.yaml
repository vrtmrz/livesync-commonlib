  Note:
    description: >2-
       Este replicador nos permite sincronizar nuestra bóveda con otros
      dispositivos utilizando una conexión de igual a igual. Podemos usar esto
      para sincronizar nuestra bóveda con nuestros otros dispositivos sin usar
      un servicio en la nube.

      Este replicador está basado en Trystero. También utiliza un servidor de
      señalización para establecer una conexión entre dispositivos. El servidor
      de señalización se utiliza para intercambiar información de conexión entre
      dispositivos. Conoce (o no debería) conocer ni almacenar ninguno de
      nuestros datos.


      Cualquiera puede alojar el servidor de señalización. Esto es sólo un
      relevo de Nostr. En aras de la simplicidad y para comprobar el
      comportamiento del replicador, vrtmrz aloja una instancia del servidor de
      señalización. Puede utilizar el servidor experimental proporcionado por
      vrtmrz o puede utilizar cualquier otro servidor.


      Por cierto, aunque el servidor de señalización no almacene nuestros datos,
      puede ver la información de conexión de algunos de nuestros dispositivos.
      Tenga en cuenta esto. Además, tenga cuidado al utilizar el servidor
      proporcionado por otra persona.
    important_note: Replicador de igual a igual.
    important_note_sub: Esta característica todavía está a la vanguardia. Tenga en
      cuenta que asegúrese de realizar una copia de seguridad de sus datos antes
      de utilizar esta función. Y estaríamos muy contentos si pudiera contribuir
      al desarrollo de esta función.
