      > ```

      ${public_key}

      > ```

      >

      > ### Clave privada

      > ```

      ${private_key}

      > ```

      >

      > </div>


      >[!Ambas para copiar]-

      >

      > <div class="sls-keypair">

      >

      > ```

      ${public_key}

      ${private_key}

      > ```

      >

      > </div>
