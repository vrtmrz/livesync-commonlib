"Setup.Some devices have differing progress values (max: ${maxProgress}, min: ${minProgress}).\nThis may indicate that some devices have not completed synchronisation, which could lead to conflicts. Strongly recommend confirming that all devices are synchronised before proceeding.": >-
  Algunos dispositivos tienen valores de progreso diferentes (máx.:
  ${maxProgress}, mín.: ${minProgress}).

  Esto puede indicar que algunos dispositivos no han completado la
  sincronización, lo que podría causar conflictos. Se recomienda encarecidamente
  confirmar que todos los dispositivos estén sincronizados antes de continuar.
"Setup.The following accepted nodes are missing its node information:\n- ${missingNodes}\n\nThis indicates that they have not been connected for some time or have been left on an older version.\nIt is preferable to update all devices if possible. If you have any devices that are no longer in use, you can clear all accepted nodes by locking the remote once.": >-
  Los siguientes nodos aceptados no tienen información del nodo:

  - ${missingNodes}


  Esto indica que no se han conectado desde hace algún tiempo o que se han
  quedado en una versión anterior.

  Si es posible, es preferible actualizar todos los dispositivos. Si tienes
  dispositivos que ya no se usan, puedes borrar todos los nodos aceptados
  bloqueando el remoto una vez.
