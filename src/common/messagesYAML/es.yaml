        Unlock: Desbloquear la base de datos remota
      Message:
        _value: >
          La base de datos remota está bloqueada. Esto se debe a una
          reconstrucción en una de las terminales.

          Por lo tanto, se solicita al dispositivo que retenga la conexión para
          evitar daños en la base de datos.


          Hay tres opciones que podemos hacer:


          - %{Replicator.Dialogue.Locked.Action.Fetch}
            La forma más preferida y confiable. Esto eliminará la base de datos local una vez y restablecerá toda la información de sincronización de la base de datos remota nuevamente. En la mayoría de los casos, podemos realizar esto de manera segura. Sin embargo, lleva algo de tiempo y debe realizarse en una red estable.
          - %{Replicator.Dialogue.Locked.Action.Unlock}
            Este método solo se puede utilizar si ya estamos sincronizados de manera confiable mediante otros métodos de replicación. Esto no significa simplemente que tengamos los mismos archivos. Si no estás seguro, debes evitarlo.
          - %{Replicator.Dialogue.Locked.Action.Dismiss}
              Esto cancelará la operación. Y le preguntaremos nuevamente en la próxima solicitud.
        Fetch: Se ha programado recuperar todo. El complemento se reiniciará para
          ejecutarlo.
        Unlocked: La base de datos remota ha sido desbloqueada. Vuelva a intentar la
          operación.
