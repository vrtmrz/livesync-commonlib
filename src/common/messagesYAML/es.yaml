Using public TURN servers may have privacy implications, as your data will be relayed through third-party servers. Even if your data are encrypted, your existence may be known to them. Please ensure you trust the TURN server provider before using their services. Also your `network administrator` too. You should consider setting up your own TURN server for your FQDN, if possible.:
  Usar servidores TURN públicos puede tener implicaciones de privacidad, ya que
  tus datos se retransmitirán a través de servidores de terceros. Aunque tus
  datos estén cifrados, tu existencia puede quedar expuesta ante ellos.
  Asegúrate de confiar en el proveedor del servidor TURN antes de usar sus
  servicios. Y también en tu `administrador de red`. Deberías considerar
  configurar tu propio servidor TURN para tu FQDN, si es posible.
