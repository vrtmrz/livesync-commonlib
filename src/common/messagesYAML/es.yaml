RedFlag:
  Fetch:
    Method:
      Desc: >-
        ¿Cómo desea buscar?

        - %{RedFlag.Fetch.Method.FetchSafer}.
          **Bajo tráfico**, **Alta CPU**, **Bajo riesgo**
          Recomendado si...
          - Archivos posiblemente inconsistentes
          - Los archivos no eran tanto.
        - %{RedFlag.Fetch.Method.FetchSmoother}.
          **Tráfico bajo**, **CPU moderado**, **Riesgo bajo a moderado**
          Recomendado si...
          - Archivos probablemente consistentes
          - Tienes muchos archivos.
        - %{RedFlag.Fetch.Method.FetchTraditional}.
          **Alto tráfico**, **Baja CPU**, **Riesgo bajo a moderado**

        >[!INFO]- Detalles

        > ## %{RedFlag.Fetch.Method.FetchSafer}.

        > **Bajo tráfico**, **CPU alta**, **Bajo riesgo**

        > Esta opción primero crea una base de datos local utilizando archivos
        locales existentes antes de recuperar datos de la fuente remota.

        > Si existen archivos coincidentes tanto local como remotamente, solo se
        transferirán las diferencias entre ellos.

        > Sin embargo, los archivos presentes en ambas ubicaciones se tratarán
        inicialmente como archivos en conflicto. Se resolverán automáticamente
        si en realidad no entran en conflicto, pero este proceso puede llevar
        tiempo.

        > Este es generalmente el método más seguro y minimiza el riesgo de
        pérdida de datos.

        > ## %{RedFlag.Fetch.Method.FetchSmoother}.

        > **Tráfico bajo**, **CPU moderado**, **Riesgo bajo a moderado**
        (dependiendo de la operación)

        > Esta opción primero crea fragmentos de archivos locales para la base
        de datos y luego recupera datos. En consecuencia, sólo se transfieren
        los fragmentos que faltan localmente. Sin embargo, todos los metadatos
        se toman de la fuente remota.

        > Luego, los archivos locales se comparan con estos metadatos en el
        momento del lanzamiento. El contenido considerado más nuevo
        sobrescribirá al anterior (por hora de modificación). Este resultado
        luego se sincroniza nuevamente con la base de datos remota.

        > Esto generalmente es seguro si los archivos locales tienen realmente
        la última marca de tiempo. Sin embargo, puede causar problemas si un
        archivo tiene una marca de tiempo más nueva pero un contenido más
        antiguo (como el `welcome.md` inicial).

        > Esto utiliza menos CPU y es más rápido que
        "%{RedFlag.Fetch.Method.FetchSafer}", pero puede provocar la pérdida de
        datos si no se usa con cuidado.

        > ## %{RedFlag.Fetch.Method.FetchTraditional}.

        > **Alto tráfico**, **Baja CPU**, **Riesgo bajo a moderado**
        (dependiendo de la operación)

        > Todo se recuperará desde el control remoto.

        > Similar al %{RedFlag.Fetch.Method.FetchSmoother}, pero todos los
        fragmentos se obtienen de la fuente remota.

        > Esta es la forma más tradicional de recuperar datos y, por lo general,
        consume la mayor cantidad de tráfico y tiempo de red. También conlleva
        un riesgo similar de sobrescribir archivos remotos con la opción
        '%{RedFlag.Fetch.Method.FetchSmoother}'.

        > Sin embargo, a menudo se considera el método más estable porque es el
