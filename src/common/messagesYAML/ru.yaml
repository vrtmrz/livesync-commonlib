    > [!MORE]-
    > Если вы пользуетесь хранилищем много лет, в базе могли накопиться неиспользуемые фрагменты, то есть мусор. Поэтому рекомендуется выполнить полную перестройку. Скорее всего, база станет заметно меньше.
    >
    > Если объем вашего хранилища просто растет, лучше выполнить перестройку после наведения порядка в файлах. Self-hosted LiveSync не удаляет фактические данные сразу после удаления файлов, чтобы ускорить работу. Это кратко [описано](https://github.com/vrtmrz/obsidian-livesync/blob/main/docs/tech_info.md).
    >
    > Если рост вас не беспокоит, можно увеличить порог уведомления на 100MB. Это подходит, если вы используете собственный сервер. Тем не менее время от времени лучше выполнять перестройку.
    >

    > [!WARNING]
    > Перед полной перестройкой убедитесь, что все устройства синхронизированы. Плагин постарается выполнить слияние насколько возможно.
