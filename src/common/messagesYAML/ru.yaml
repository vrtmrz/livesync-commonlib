    Main: >-
      
      Настройки в удаленной базе данных приведены ниже. Эти значения были
      настроены другими устройствами, которые хотя бы один раз
      синхронизировались с этим устройством.


      Если вы хотите использовать эти настройки, выберите
      %{TweakMismatchResolve.Action.UseConfigured}.

