      Message:
        _value: >
          Удалённая база данных заблокирована. Это связано с перестроением на
          одном из терминалов.

          Поэтому этому устройству предлагается воздержаться от подключения,
          чтобы избежать повреждения базы данных.


          Доступны три варианта:


          - %{Replicator.Dialogue.Locked.Action.Fetch}
            Самый предпочтительный и надёжный способ. Он один раз удалит локальную базу данных и заново сбросит всю информацию синхронизации из удалённой базы данных. В большинстве случаев это можно выполнить безопасно. Однако это занимает время и должно выполняться при стабильной сети.
          - %{Replicator.Dialogue.Locked.Action.Unlock}
            Этот способ можно использовать только если мы уже надёжно синхронизированы другими методами репликации. Это не просто означает, что у нас одинаковые файлы. Если вы не уверены, лучше избегать этого варианта.
          - %{Replicator.Dialogue.Locked.Action.Dismiss}
            Операция будет отменена. При следующем запросе вопрос будет задан снова.
