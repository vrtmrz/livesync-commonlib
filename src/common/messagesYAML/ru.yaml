    (извините, но это действительно важно).


    Как вы хотите настроить подключение вручную?
  msgSinceV02321: >-
    Начиная с v0.23.21, Self-hosted LiveSync изменил поведение по умолчанию и
    структуру базы данных. Были внесены следующие изменения:


    1. **Чувствительность имен файлов к регистру**
       Обработка имен файлов теперь не чувствительна к регистру. Это полезно для большинства платформ, кроме Linux и iOS, где регистр имен файлов обрабатывается иначе.
       (На таких платформах будет показано предупреждение для файлов с одинаковым именем, но разным регистром.)

    2. **Обработка ревизий фрагментов**
       Фрагменты стали неизменяемыми, что позволяет фиксировать их ревизии. Это повышает производительность сохранения файлов.

    ___Однако, чтобы включить любое из этих изменений, нужно перестроить и
    удаленную, и локальную базы данных. Этот процесс занимает несколько минут,
    поэтому лучше делать это, когда у вас достаточно времени.___


    - Если вы хотите сохранить прежнее поведение, пропустите процесс с помощью
    `${KEEP}`.

    - Если у вас сейчас недостаточно времени, выберите `${DISMISS}`. Позже
    появится повторный запрос.

    - Если вы уже перестроили базу данных на другом устройстве, выберите
    `${DISMISS}` и попробуйте синхронизироваться снова. Так как обнаружено
    различие, запрос появится повторно.
