The maximum total size of chunks that can be incubated within the document. Chunks exceeding this size will immediately graduate to independent chunks.:
  Максимальный суммарный размер чанков, которые могут инкубироваться внутри
  документа. Чанки, превышающие этот размер, будут немедленно преобразованы в
  независимые чанки.
The minimum interval for automatic synchronisation on event.: Минимальный интервал автоматической синхронизации по событию.
This feature enables direct synchronisation between devices. No server is required, but both devices must be online at the same time for synchronisation to occur, and some features may be limited. Internet connection is only required to signalling (detecting peers) and not for data transfer.:
  Эта функция обеспечивает прямую синхронизацию между устройствами. Сервер не
  требуется, но для синхронизации оба устройства должны быть одновременно в
  сети, а некоторые функции могут быть ограничены. Подключение к Интернету нужно
  только для сигнализации (обнаружения пиров), а не для передачи данных。
This is an advanced option for users who do not have a URI or who wish to configure detailed settings.:
  Это расширенный вариант для пользователей, у которых нет URI или которые хотят
  вручную задать подробные параметры。
This is the most suitable synchronisation method for the design. All functions are available. You must have set up a CouchDB instance.:
  Это наиболее подходящий для данной архитектуры способ синхронизации. Доступны
  все функции. Необходимо заранее развернуть экземпляр CouchDB。
This passphrase will not be copied to another device. It will be set to `Default` until you configure it again.:
  Эта парольная фраза не будет скопирована на другое устройство. Она будет
  установлена в значение `Default`, пока вы не настроите её снова.
This will recreate chunks for all files. If there were missing chunks, this may fix the errors.:
  Это пересоздаст чанки для всех файлов. Если какие-то чанки отсутствовали, это
  может исправить ошибки.
