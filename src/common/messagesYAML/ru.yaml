RedFlag:
  Fetch:
    Method:
      Desc: >-
        Как вы хотите выполнить получение?

        - %{RedFlag.Fetch.Method.FetchSafer}.
          **Меньше трафика**, **больше нагрузки на CPU**, **низкий риск**
          Рекомендуется, если ...
          - файлы могут быть несогласованы
          - файлов не слишком много
        - %{RedFlag.Fetch.Method.FetchSmoother}.
          **Меньше трафика**, **умеренная нагрузка на CPU**, **низкий или умеренный риск**
          Рекомендуется, если ...
          - файлы, скорее всего, согласованы
          - у вас много файлов.
        - %{RedFlag.Fetch.Method.FetchTraditional}.
          **Больше трафика**, **меньше нагрузки на CPU**, **низкий или умеренный риск**

        >[!INFO]- Подробности

        > ## %{RedFlag.Fetch.Method.FetchSafer}.

        > **Меньше трафика**, **больше нагрузки на CPU**, **низкий риск**

        > Этот вариант сначала создаёт локальную базу данных из существующих
        локальных файлов, а затем получает данные из удалённого источника.

        > Если совпадающие файлы есть и локально, и удалённо, будут переданы
        только различия между ними.

        > Однако файлы, присутствующие в обоих местах, сначала будут обработаны
        как конфликтующие. Если реального конфликта нет, они будут разрешены
        автоматически, но это может занять время.

        > Обычно это самый безопасный способ, минимизирующий риск потери данных.

        > ## %{RedFlag.Fetch.Method.FetchSmoother}.

        > **Меньше трафика**, **умеренная нагрузка на CPU**, **низкий или
        умеренный риск** (зависит от операции)

        > Этот вариант сначала создаёт чанки из локальных файлов для базы
        данных, а затем получает данные. Поэтому передаются только отсутствующие
        локально чанки. Но все метаданные берутся из удалённого источника.

        > При запуске локальные файлы сравниваются с этими метаданными.
        Содержимое, которое считается более новым, перезаписывает старое (по
        времени изменения). Затем результат синхронизируется обратно в удалённую
        базу данных.

        > Обычно это безопасно, если локальные файлы действительно имеют самый
        новый timestamp. Но возможны проблемы, если файл имеет более новый
        timestamp, но более старое содержимое (например, начальный
        `welcome.md`).

        > Это использует меньше CPU и работает быстрее, чем
        "%{RedFlag.Fetch.Method.FetchSafer}", но при неосторожном использовании
        может привести к потере данных.

        > ## %{RedFlag.Fetch.Method.FetchTraditional}.

        > **Больше трафика**, **меньше нагрузки на CPU**, **низкий или умеренный
        риск** (зависит от операции)

        > Всё будет получено из удалённого источника.

        > Похоже на %{RedFlag.Fetch.Method.FetchSmoother}, но все чанки
        загружаются из удалённого источника.

        > Это самый традиционный способ получения, обычно требующий больше всего
