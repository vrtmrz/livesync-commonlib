      ${additionalMessage}
    MainTweakResolving: >-
      Конфигурация вашего устройства не совпадает с конфигурацией на удаленном
      сервере.


      Следующие параметры должны совпадать:


      ${table}


      Сообщите, какое решение вы выбираете.


      ${additionalMessage}
