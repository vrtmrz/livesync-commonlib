Files with modification times greater than this value (in seconds since the Unix epoch) will not have their events reflected. Set to 0 to disable this limit.: 수정 시간이 이 값(Unix epoch 이후 초)보다 큰 파일은 이벤트가 반영되지 않습니다. 0으로 설정하면 이 제한을 비활성화합니다.
Forces the file to be synced when opened.: 파일을 열 때 강제로 동기화합니다.
Handle files as Case-Sensitive: 파일을 대소문자 구분으로 처리
