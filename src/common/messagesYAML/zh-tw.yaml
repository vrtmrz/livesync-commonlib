  logSetupCancelled: 設定已取消,Self-hosted LiveSync 正在等待您的設定！
  msgFetchRemoteAgain: |-
    您可能已經知道,Self-hosted LiveSync 更改了其預設行為和資料庫結構。

    值得慶幸的是,在您的時間和努力下,遠端資料庫似乎已經遷移完成。恭喜！

    但是,我們還需要一點點操作。此裝置的配置與遠端資料庫不相容。我們需要再次從遠端資料庫獲取。我們現在應該再次從遠端獲取嗎？

    ___注意:在更改配置並再次獲取資料庫之前,我們無法進行同步。___
    ___注意2:chunks 是完全不可變的,我們只能獲取後設資料和差異
  msgInitialSetup: |-
    您的裝置**尚未設定**。讓我引導您完成設定過程。

    請記住,每個對話方塊內容都可以複製到剪貼簿。如果以後需要參考,可以將其貼上到 Obsidian 的筆記中。您也可以使用翻譯工具將其翻譯成您的語言。

    首先,您有**設定 URI** 嗎？

    注意:如果您不知道這是什麼,請參閱[文件](${URI_DOC})
  msgRecommendSetupUri: |-
    我們強烈建議您生成一個設定 URI 並使用它。
    如果您對此不瞭解,請參閱[文件](${URI_DOC})(再次抱歉,但這很重要)。

    您想如何手動設定?
  msgSinceV02321: |-
    自 v0.23.21 起,Self-hosted LiveSync 更改了預設行為和資料庫結構。進行了以下更改：

    1. **檔名的區分大小寫**
    現在處理檔名時不區分大小寫。這對於大多數平臺來說是一個有益的更改,除了 Linux 和 iOS,它們不能有效地管理檔名的大小寫敏感性。
    (在這些平臺上,對於名稱相同但大小寫不同的檔案將顯示警告)。

    2. **chunks 的版本處理**
    chunks 是不可變的,這使得它們的版本可以固定。此更改將提高檔案儲存的效能。

    ___然而,要啟用這些更改中的任何一個,都需要重建遠端和本地資料庫。這個過程需要幾分鐘,我們建議您在有充足時間時進行。___

    - 如果您希望保持以前的行為,可以使用 `${KEEP}` 跳過此過程。
    - 如果您沒有足夠的時間,請選擇 `${DISMISS}`。稍後會再次提示您。
    - 如果您已在另一臺裝置上重建了資料庫,請選擇 `${DISMISS}` 並嘗試再次同步。由於檢測到差異,系統會再次提示您
