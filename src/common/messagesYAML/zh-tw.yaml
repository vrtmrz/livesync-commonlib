RedFlag:
  Fetch:
    Method:
      Desc: |-
        您希望如何獲取資料？
        - %{RedFlag.Fetch.Method.FetchSafer}
          **低流量**、**高 CPU 佔用**、**低風險**
          推薦用於...
          - 檔案可能不一致
          - 檔案數量不多
        - %{RedFlag.Fetch.Method.FetchSmoother}
          **低流量**、**中等 CPU 佔用**、**低到中等風險**
          推薦用於...
          - 檔案可能一致
          - 檔案數量較多
        - %{RedFlag.Fetch.Method.FetchTraditional}
          **高流量**、**低 CPU 佔用**、**低到中等風險**

        >[!INFO]- 詳細資訊
        > ## %{RedFlag.Fetch.Method.FetchSafer}
        > **低流量**、**高 CPU 佔用**、**低風險**
        > 此選項首先使用現有本地檔案建立本地資料庫，然後從遠端源獲取資料。
        > 如果本地和遠端存在匹配的檔案，則僅傳輸兩者之間的差異。
        > 但是，兩端都存在的檔案最初會被視為衝突檔案。如果它們實際上沒有衝突，將自動解決，但此過程可能需要時間。
        > 這通常是最安全的方法，能最大限度地降低資料丟失風險。
        > ## %{RedFlag.Fetch.Method.FetchSmoother}
        > **低流量**、**中等 CPU 佔用**、**低到中等風險**（取決於操作）
        > 此選項首先從本地檔案建立資料塊，然後獲取資料。因此，僅傳輸本地缺少的資料塊。但是，所有後設資料均從遠端源獲取。
        > 啟動時會將本地檔案與該後設資料進行比較。內容較新的一方將覆蓋較舊的一方（按修改時間）。然後將結果同步回遠端資料庫。
        > 如果本地檔案的時間戳確實是最新的一般來說是安全的。但是，如果檔案具有較新的時間戳但內容較舊（如初始的 `welcome.md`），則可能導致問題。
        > 此方法使用較少的 CPU 且比"%{RedFlag.Fetch.Method.FetchSafer}"更快，但如果使用不當可能導致資料丟失。
        > ## %{RedFlag.Fetch.Method.FetchTraditional}
        > **高流量**、**低 CPU 佔用**、**低到中等風險**（取決於操作）
        > 所有資料將從遠端獲取。
        > 與 %{RedFlag.Fetch.Method.FetchSmoother} 類似，但所有資料塊都從遠端源獲取。
        > 這是最傳統的獲取方式，通常消耗最多的網路流量和時間。它也存在與"%{RedFlag.Fetch.Method.FetchSmoother}"選項類似的覆蓋遠端檔案的風險。
        > 但是，由於它是最久經考驗和最直接的方法，通常被認為是最穩定的。
      FetchSafer: 獲取前先建立本地資料庫
      FetchSmoother: 獲取前先建立本地檔案塊
      FetchTraditional: 從遠端獲取所有資料
      Title: 您希望如何獲取資料？
