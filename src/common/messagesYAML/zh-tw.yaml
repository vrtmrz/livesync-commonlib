    > [!MORE]-
    > 如果您已經使用了很多年,資料庫中可能會積累未引用的 chunks——也就是垃圾。因此,我們建議重建所有內容。它可能會變得小得多。
    >
    > 如果您的庫容量只是在增加,最好在整理檔案後重建所有內容。即使您為了加速過程刪除了檔案,Self-hosted LiveSync 也不會刪除實際資料。這大致[有文件記錄](https://github.com/vrtmrz/obsidian-livesync/blob/main/docs/tech_info.md)。
    >
    > 如果您不介意增加,可以將通知限制增加 100MB。如果您在自己的伺服器上執行,就是這種情況。但是,最好還是不時地重建所有內容。
    >

    > [!WARNING]
    > 如果您執行重建所有內容,請確保所有裝置都已同步。儘管如此,外掛會儘可能地合併
  msgSetDBCapacity: |
