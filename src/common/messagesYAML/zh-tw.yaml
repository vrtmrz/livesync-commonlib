    > - 800: 如果遠端儲存大小超過 800MB 則發出警告。
    >   如果您使用的是 fly.io(1GB 限制) 或 IBM Cloudant,則推薦此選項。
    > - 2000: 如果遠端儲存大小超過 2GB 則發出警告。

