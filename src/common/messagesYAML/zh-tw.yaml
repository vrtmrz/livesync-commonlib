      later: 我稍後再做
      rebuild: 重建所有內容
    laterMessage: 我們強烈建議儘快處理此問題！
    message: |
      一些塊未安全儲存，並且在資料庫中未加密
      **請重建資料庫以修復此問題**.

      如果你的遠端資料庫未配置 SSL，或者使用了不安全的憑據 **你可能面臨暴露敏感資料的風險**.

      注意：請在所有裝置上將 Self-hosted LiveSync 升級到 v0.25.6 或更高版本，並確保備份你的保險庫

      注意2：重建所有內容和獲取操作會消耗一些時間和流量，請在非高峰時段進行，並確保網路連線穩定
