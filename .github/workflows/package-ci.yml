name: Package CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  package-verification:
    name: Package verification
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm run verify:package

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration:managed

  package-boundary:
    name: Complete package gate
    if: always()
    needs:
      - package-verification
      - integration-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Require all package checks
        env:
          INTEGRATION_RESULT: ${{ needs.integration-tests.result }}
          PACKAGE_RESULT: ${{ needs.package-verification.result }}
        run: |
          test "$PACKAGE_RESULT" = success
          test "$INTEGRATION_RESULT" = success
